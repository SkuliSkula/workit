services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  workit-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-workit}
      POSTGRES_USER: ${POSTGRES_USER:-workit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - workit-db-data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-workit} -d ${POSTGRES_DB:-workit}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── API ─────────────────────────────────────────────────────────────────────
  workit-api:
    build:
      context: ..
      dockerfile: Workit.Api/Dockerfile
    restart: unless-stopped
    depends_on:
      workit-db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_HTTP_PORTS: "8080"
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
      ConnectionStrings__WorkitDb: "Host=workit-db;Port=5432;Database=${POSTGRES_DB:-workit};Username=${POSTGRES_USER:-workit};Password=${POSTGRES_PASSWORD}"
      Jwt__SigningKey: ${JWT_SIGNING_KEY}
      Jwt__Issuer: Workit.Api
      Jwt__Audience: Workit.Apps
      AdminSeed__Email: ${ADMIN_EMAIL}
      AdminSeed__Password: ${ADMIN_PASSWORD}
      Anthropic__ApiKey: ${ANTHROPIC_API_KEY}
      PostHog__ProjectApiKey: ${POSTHOG_API_KEY:-}
      Resend__ApiKey: ${RESEND_API_KEY}
      Resend__From: ${RESEND_FROM:-Workit <noreply@workit.is>}
      App__Url: ${APP_URL:-https://app.workit.is}
    networks:
      - internal
      - app

  # ── Owner App (Blazor Server) ───────────────────────────────────────────────
  workit-owner:
    build:
      context: ..
      dockerfile: Workit.OwnerApp/Dockerfile
    restart: unless-stopped
    depends_on:
      - workit-api
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_HTTP_PORTS: "8080"
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
      # Internal Docker DNS — avoids a public roundtrip for server→API calls
      ApiBaseUrl: "http://workit-api:8080/"
      Payday__ClientId: ${PAYDAY_CLIENT_ID:-}
      Payday__ClientSecret: ${PAYDAY_CLIENT_SECRET:-}
    networks:
      - app

  # ── Cloudflare Tunnel ───────────────────────────────────────────────────────
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - app

networks:
  internal:
    internal: true   # DB-only — not reachable from cloudflared
  app:
    driver: bridge   # API + Owner app + cloudflared

volumes:
  workit-db-data:
