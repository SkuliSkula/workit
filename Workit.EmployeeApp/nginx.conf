events {}

http {
    include /etc/nginx/mime.types;

    # Ensure .wasm files get the correct MIME type
    types {
        application/wasm wasm;
    }

    server {
        listen 80;
        root /usr/share/nginx/html;
        index index.html;

        # SPA fallback — serve index.html for any route not found on disk
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Never cache the entry point or config
        location ~* \.(html|json)$ {
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }

        # Aggressively cache versioned static assets
        location ~* \.(js|css|wasm|png|jpg|jpeg|gif|ico|svg|gz|br)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }
    }
}
